name: Update CHANGELOG

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: update-changelog
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # git-cliff needs full history to walk all commits
          fetch-depth: 0

      - name: Generate CHANGELOG.md with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: :paperclip: update CHANGELOG"
          branch: chore/update-changelog
          title: "chore: :paperclip: update CHANGELOG"
          body: "CHANGELOG update by git-cliff"
          labels: "automated"

      - name: Auto-merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
